<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>블로그 자동화 실습 안내 · 1차시</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📋</text></svg>">
<style>
  :root{
    --ground:#F5EEE7; --card:#FFFFFF; --ink:#2A2320; --sub:#6E6157;
    --accent:#D97015; --accent-2:#B85A0E; --soft:#FBEEDF; --line:#EAE0D5;
    --code:#241F1B; --code-ink:#F3E9DD; --err:#C0392B;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{min-height:100vh;background:var(--ground);color:var(--ink);
    font-family:'Apple SD Gothic Neo','Pretendard','Malgun Gothic','Noto Sans KR',sans-serif;
    -webkit-font-smoothing:antialiased;}
  .bg{min-height:100vh;padding:0 0 64px;}
  .wrap{max-width:680px;margin:0 auto;padding:0 20px;}
  header.top{padding:42px 0 24px;}
  .eyebrow{font-size:12.5px;font-weight:800;letter-spacing:.08em;color:var(--accent);text-transform:uppercase;}
  h1{font-size:34px;font-weight:900;letter-spacing:-.02em;margin:10px 0 0;text-wrap:balance;}
  .lead{font-size:16px;color:var(--sub);margin-top:12px;line-height:1.65;}
  .lead b{color:var(--ink);}
  .steps{display:flex;flex-direction:column;gap:14px;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:22px;
    box-shadow:0 2px 10px rgba(90,70,55,.05);}
  .card-head{display:flex;align-items:center;gap:13px;}
  .num{flex:none;width:34px;height:34px;border-radius:50%;background:var(--accent);color:#fff;
    font-weight:900;font-size:17px;display:flex;align-items:center;justify-content:center;
    font-variant-numeric:tabular-nums;}
  .num.lock-ic{background:var(--ink);font-size:15px;}
  .card h2{font-size:19.5px;font-weight:800;letter-spacing:-.01em;}
  .card .h2sub{font-size:14px;font-weight:600;color:var(--sub);margin-left:2px;}
  .card p{font-size:15.5px;color:var(--sub);line-height:1.72;margin-top:12px;}
  .card p b{color:var(--ink);}
  .card ol{margin:14px 0 0;padding-left:22px;}
  .card ol li{font-size:15.5px;color:var(--sub);line-height:1.7;margin-top:7px;}
  .card ol li b{color:var(--ink);}
  .card code{background:var(--soft);color:var(--accent-2);font-weight:800;
    padding:2px 7px;border-radius:6px;font-size:14px;}
  .btn{display:inline-flex;align-items:center;gap:8px;background:var(--accent);color:#fff;
    font-weight:800;font-size:15.5px;border:none;border-radius:11px;padding:13px 20px;
    cursor:pointer;text-decoration:none;margin-top:16px;}
  .btn:hover{background:var(--accent-2);}
  .btn:focus-visible{outline:3px solid rgba(217,112,21,.42);outline-offset:2px;}
  .note{font-size:13px;color:var(--sub);margin-top:10px;}
  .pagenav{display:flex;gap:12px;margin-top:26px;flex-wrap:wrap;}
  .pagenav .btn{margin-top:0;flex:1;justify-content:center;min-width:200px;}
  .btn.ghost{background:transparent;color:var(--accent);border:1.5px solid var(--line);}
  .btn.ghost:hover{background:var(--soft);}
  form#pwform,form#examform{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap;}
  form#pwform .btn,form#examform .btn{margin-top:0;}
  #pw,#examcode{flex:1;min-width:180px;font-size:16px;padding:12px 14px;border:1px solid var(--line);
    border-radius:11px;background:#fff;color:var(--ink);}
  #pw:focus,#examcode:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(217,112,21,.15);}
  .err{color:var(--err);font-size:14px;font-weight:700;margin-top:12px;}
  .codebox{margin-top:14px;background:var(--code);border-radius:12px;overflow:hidden;}
  .cb-top{display:flex;justify-content:space-between;align-items:center;
    padding:10px 12px 10px 16px;border-bottom:1px solid rgba(255,255,255,.09);}
  .cb-label{font-size:12px;font-weight:700;color:#C7B6A4;letter-spacing:.03em;}
  .cb-copy{background:rgba(255,255,255,.12);color:#fff;border:none;border-radius:8px;
    padding:7px 13px;font-size:13px;font-weight:800;cursor:pointer;}
  .cb-copy:hover{background:rgba(255,255,255,.22);}
  .cb-copy:focus-visible{outline:2px solid #fff;outline-offset:2px;}
  pre{margin:0;padding:16px;color:var(--code-ink);font-size:13.5px;line-height:1.62;
    white-space:pre-wrap;word-break:break-word;overflow-x:auto;
    font-family:'Apple SD Gothic Neo','Malgun Gothic',ui-monospace,monospace;}
  pre.cmd{font-size:17px;font-weight:700;padding:18px 16px;color:#fff;}
  pre.exam{max-height:340px;overflow-y:auto;font-size:12.5px;line-height:1.6;}
  .accordion{display:grid;grid-template-rows:0fr;transition:grid-template-rows .45s ease;}
  .accordion.open{grid-template-rows:1fr;}
  .accordion > .acc-inner{overflow:hidden;min-height:0;}
  .foot{margin-top:32px;text-align:center;font-size:14px;color:var(--sub);line-height:1.6;}
  .foot .hand{color:var(--accent);font-weight:800;}
  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(18px);
    background:var(--ink);color:#fff;font-weight:700;font-size:14px;padding:11px 20px;
    border-radius:24px;opacity:0;pointer-events:none;transition:all .24s ease;z-index:50;
    box-shadow:0 10px 30px rgba(0,0,0,.25);}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  @media (prefers-reduced-motion:reduce){.toast{transition:opacity .01s;}.accordion{transition:none;}}
  @media (max-width:520px){h1{font-size:28px;}.wrap{padding:0 15px;}.card{padding:18px;}}
</style>
</head>
<body>
<div class="bg"><main class="wrap">
  <header class="top">
    <div class="eyebrow">초강스 AI 중급 세미나 · 블로그 자동화 1차시</div>
    <h1>결과 확인 &amp; 폰 연결</h1>
    <p class="lead">만든 결과물을 보고, 폰으로 직접 시켜봅니다.</p>
  </header>

  <section id="lock" class="card">
    <div class="card-head"><div class="num lock-ic">🔒</div><h2>열람 비밀번호</h2></div>
    <p>수업에서 안내받은 비밀번호를 입력하면 실습 안내가 열립니다.</p>
    <form id="pwform" autocomplete="off">
      <input id="pw" type="password" placeholder="비밀번호" autocomplete="off" aria-label="열람 비밀번호">
      <button class="btn" type="submit">열기</button>
    </form>
    <p id="pwerr" class="err" hidden>비밀번호가 맞지 않아요. 다시 입력해 주세요.</p>
  </section>

  <div id="content"></div>
</main></div>
<div class="toast" id="toast">복사됐어요 ✓</div>

const $=function(id){return document.getElementById(id);};
const toastEl=$('toast');let _tt;
function showToast(m){toastEl.textContent=m;toastEl.classList.add('show');clearTimeout(_tt);_tt=setTimeout(function(){toastEl.classList.remove('show');},1500);}
function b64d(s){return Uint8Array.from(atob(s),function(c){return c.charCodeAt(0);});}
async function aesDecrypt(pw,saltB,ivB,ctB,iter){
  const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);
  const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b64d(saltB),iterations:iter,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
  const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64d(ivB)},key,b64d(ctB));
  return new TextDecoder().decode(pt);
}
function fallbackCopy(txt,ok){const ta=document.createElement('textarea');ta.value=txt;ta.style.position='fixed';ta.style.opacity='0';document.body.appendChild(ta);ta.focus();ta.select();try{document.execCommand('copy');ok();}catch(e){}document.body.removeChild(ta);}
function copyText(txt,ok){if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(txt).then(ok,function(){fallbackCopy(txt,ok);});}else{fallbackCopy(txt,ok);}}
function bindCopy(root){if(!root)return;root.querySelectorAll('.cb-copy').forEach(function(b){b.addEventListener('click',function(){const el=document.getElementById(b.getAttribute('data-copy'));copyText(el.innerText,function(){showToast('복사됐어요 ✓');});});});}
function wireExamGate(){
  const gd=$('examdata'),form=$('examform');
  if(!gd||!form)return;
  form.addEventListener('submit',async function(e){e.preventDefault();
    const code=$('examcode').value.trim().toLowerCase();if(!code)return;
    try{
      const html=await aesDecrypt(code,gd.getAttribute('data-salt'),gd.getAttribute('data-iv'),gd.getAttribute('data-ct'),parseInt(gd.getAttribute('data-iter'),10));
      const inner=$('examinner');inner.innerHTML=html;bindCopy(inner);
      $('examerr').hidden=true;form.hidden=true;
      const acc=$('examout');acc.setAttribute('aria-hidden','false');
      requestAnimationFrame(function(){acc.classList.add('open');});
    }catch(err){$('examerr').hidden=false;$('examcode').value='';$('examcode').focus();}
  });
}
function bindContent(){
  bindCopy($('content'));
  const dl=$('dl');if(dl){dl.addEventListener('click',function(e){if(dl.getAttribute('href')==='#'){e.preventDefault();showToast('다운로드 링크는 준비 중이에요');}});}
  wireExamGate();
}
async function tryUnlock(pw){
  try{const html=await aesDecrypt(pw,ENC.salt,ENC.iv,ENC.ct,ENC.iter);$('content').innerHTML=html;$('lock').hidden=true;$('pwerr').hidden=true;bindContent();try{sessionStorage.setItem('bpw',pw);}catch(e){}return true;}
  catch(e){return false;}
}
$('pwform').addEventListener('submit',async function(e){e.preventDefault();const pw=$('pw').value.trim();if(!pw)return;const ok=await tryUnlock(pw);if(!ok){$('pwerr').hidden=false;$('pw').value='';$('pw').focus();}});
(function(){try{const s=sessionStorage.getItem('bpw');if(s){tryUnlock(s);}}catch(e){}})();
</script>
